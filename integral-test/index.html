<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Integral IC Comparison — Shantell Sans</title>
<style>
body { font-family: sans-serif; max-width: 1200px; margin: 1em auto; font-size: 14px; }
h1 { font-size: 1.4em; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.cell { border: 1px solid #ddd; border-radius: 6px; padding: 12px; }
.cell h3 { margin: 0 0 8px 0; font-size: 1em; color: #444; }
.cell iframe { width: 100%; height: 280px; border: none; }
</style>
</head><body>
<h1>Integral Subscript Positioning — IC Value Comparison</h1>
<p>Inline: W=0.52 IC=0.22 (locked). Largeop: fine-tuning W and IC around W=0.654 IC=0.40.
Varying LO width (0.62-0.67) and IC (0.35-0.42).</p>

<div class="grid" id="grid"></div>

<script>
var ics = [
  {val: 'LO W=0.62 IC=0.35', file: 'bundle-lo2-0_62_0_35.js'},
  {val: 'LO W=0.63 IC=0.37', file: 'bundle-lo2-0_63_0_37.js'},
  {val: 'LO W=0.654 IC=0.38', file: 'bundle-lo2-0_654_0_38.js'},
  {val: 'LO W=0.654 IC=0.40', file: 'bundle-lo2-0_654_0_40.js'},
  {val: 'LO W=0.654 IC=0.42', file: 'bundle-lo2-0_654_0_42.js'},
  {val: 'LO W=0.67 IC=0.40', file: 'bundle-lo2-0_67_0_40.js'},
  {val: 'LO W=0.67 IC=0.42', file: 'bundle-lo2-0_67_0_42.js'},
  {val: 'LO W=0.63 IC=0.40', file: 'bundle-lo2-0_63_0_40.js'},
  {val: 'LO W=0.64 IC=0.40', file: 'bundle-lo2-0_64_0_40.js'},
];

var math = `
<div style="font-size:1.4em; line-height:2.2;">
<p>Inline: \\(\\int_\\Omega \\nabla u \\cdot \\nabla v\\, dx\\)</p>
<p>Inline: \\(\\int_0^1 f(x)\\,dx\\)</p>
<p>Inline: \\(\\int_a^b g(t)\\,dt\\)</p>
<p>Display:</p>
$$\\int_\\Omega \\nabla u \\cdot \\nabla v\\, dx = \\int_\\Omega f\\, v\\, dx$$
$$\\int_0^\\infty e^{-x^2}\\,dx = \\frac{\\sqrt{\\pi}}{2}$$
</div>
`;

var grid = document.getElementById('grid');
ics.forEach(function(ic) {
  var cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = '<h3>IC = ' + ic.val + '</h3>';
  var iframe = document.createElement('iframe');
  cell.appendChild(iframe);
  grid.appendChild(cell);

  // Write content into iframe
  setTimeout(function() {
    var doc = iframe.contentDocument;
    doc.open();
    doc.write('<!DOCTYPE html><html><head><meta charset="utf-8">');
    doc.write('<script id="MathJax-script" async src="' + ic.file + '"><\/script>');
    doc.write('</head><body style="margin:8px;">');
    doc.write(math);
    doc.write('</body></html>');
    doc.close();
  }, 100);
});
</script>
</body></html>
