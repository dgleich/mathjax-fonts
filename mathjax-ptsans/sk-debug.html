<!DOCTYPE html>
<html><head><meta charset="utf-8">
<script>
MathJax = {
  options: { enableExplorer: false, enableComplexity: false, enableEnrichment: false },
  startup: { pageReady: function() {
    return MathJax.startup.defaultPageReady().then(function() {
      setTimeout(function() {
        var out = document.getElementById('out');
        var containers = document.querySelectorAll('mjx-container');
        containers.forEach(function(c, i) {
          var svg = c.querySelector('svg');
          if (svg) {
            out.textContent += '=== Expression ' + i + ' ===\n';
            out.textContent += svg.innerHTML.substring(0, 2000) + '\n\n';
          }
        });
      }, 2000);
    });
  }}
};
</script>
<script id="MathJax-script" async src="tex-mml-svg-mathjax-ptsans.js"></script>
</head><body>
<div id="math" style="font-size:5em">\(\hat{f}\) &ensp; \(\hat{a}\) &ensp; \(\hat{A}\)</div>
<pre id="out" style="font-size:10px;max-height:600px;overflow:auto;background:#f5f5f5;padding:10px;white-space:pre-wrap;word-break:break-all"></pre>
</body></html>
